name: Build and deploy Mooncakes dashboard

on:
  workflow_dispatch:
    inputs:
      run_ai_portraits:
        description: "Run AI portraits for recent contributors"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      ai_analysis_days:
        description: "AI portrait window in days"
        required: false
        default: "7"
      ai_target_scope:
        description: "AI target owners"
        required: false
        default: "active"
        type: choice
        options:
          - active
          - newcomers
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Build daily data
        run: |
          if npm run build:data; then
            exit 0
          fi
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            echo "::warning::Cannot reach MOONCAKES_EXPORTS_BASE_URL from GitHub Actions; deploying the committed public/data/latest.json snapshot from this push."
            node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('public/data/latest.json','utf8')); if (!s.source || !s.source.exports_base_url) throw new Error('public/data/latest.json is not an exports snapshot'); console.log('Using committed snapshot', s.date, s.modules.length, 'modules');"
            exit 0
          fi
          exit 1
        env:
          MOONCAKES_EXPORTS_BASE_URL: ${{ vars.MOONCAKES_EXPORTS_BASE_URL || 'http://192.168.86.2:18080' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          AI_PORTRAIT_LIMIT: ${{ vars.AI_PORTRAIT_LIMIT }}
          RUN_AI_PORTRAITS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ai_portraits || 'false' }}
          AI_ANALYSIS_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.ai_analysis_days || '7' }}
          AI_TARGET_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.ai_target_scope || 'active' }}
      - name: Validate dashboard snapshot
        run: npm run validate:data
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
