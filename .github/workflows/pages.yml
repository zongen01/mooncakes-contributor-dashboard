name: Build and deploy Mooncakes dashboard

on:
  workflow_dispatch:
    inputs:
      run_ai_portraits:
        description: "Run AI portraits for recent contributors"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      ai_analysis_days:
        description: "AI portrait window in days"
        required: false
        default: "7"
      ai_target_scope:
        description: "AI target owners"
        required: false
        default: "active"
        type: choice
        options:
          - active
          - newcomers
  schedule:
    - cron: "20 1 * * *"
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build daily data
        run: npm run build:data
        env:
          GITHUB_TOKEN: ${{ github.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          AI_PORTRAIT_LIMIT: ${{ vars.AI_PORTRAIT_LIMIT }}
          RUN_AI_PORTRAITS: ${{ github.event_name == 'workflow_dispatch' && inputs.run_ai_portraits || 'false' }}
          AI_ANALYSIS_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.ai_analysis_days || '7' }}
          AI_TARGET_SCOPE: ${{ github.event_name == 'workflow_dispatch' && inputs.ai_target_scope || 'active' }}
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
